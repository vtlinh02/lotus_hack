<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Mandelbrot Warp Lab</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #0b0f14;
        color: #e6edf3;
      }

      .wrap {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        padding: 16px;
      }

      .panel {
        background: #111827;
        border: 1px solid #243041;
        border-radius: 12px;
        padding: 12px;
      }

      canvas {
        display: block;
        background: #000;
        border: 1px solid #334155;
        width: 100%;
        max-width: 100%;
        image-rendering: pixelated;
      }

      #mandelCanvas {
        width: 640px;
        height: 480px;
      }

      #traceCanvas {
        width: 640px;
        height: 480px;
      }

      .meta {
        margin-top: 10px;
        white-space: pre-wrap;
        font-family: ui-monospace, monospace;
        font-size: 13px;
        line-height: 1.4;
      }

      .title {
        margin: 0 0 8px 0;
        font-size: 18px;
      }

      .hint {
        color: #93a4b7;
        font-size: 13px;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <h2 class="title">Mandelbrot View</h2>
        <div class="hint">
          Click the image. The app will trace one logical GPU warp of 32 neighboring pixels.
        </div>
        <canvas id="mandelCanvas" width="640" height="480"></canvas>
        <div id="mandelMeta" class="meta"></div>
      </div>

      <div class="panel">
        <h2 class="title">Warp Divergence Trace</h2>
        <div class="hint">
          Columns = lanes 0..31, rows = iteration steps, bright = active lane.
        </div>
        <canvas id="traceCanvas" width="640" height="480"></canvas>
        <div id="traceMeta" class="meta"></div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
